name: Docker Build task-2

on: 
  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:

            - name: Code Checkout
              uses: actions/checkout@v4
              
            - name: Build Docker iamges
              uses: docker/build-push-action@v6
              with:
                context: .
                push: false
                tags: |
                  ${{ vars.DOCKERHUB_USER }}/python-test-app:latest
   