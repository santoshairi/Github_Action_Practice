name: Docker Build and Push

on:
  push:
    branches:
      - main
      - feature/*
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/test-app:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/test-app:latest ${{ secrets.DOCKER_USERNAME }}/test-app:sha-${{ env.SHA_SHORT }}

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/test-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/test-app:sha-${{ env.SHA_SHORT }}